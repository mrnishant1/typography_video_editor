        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Anek+Devanagari&family=Amita:wght@400;700&family=Arya:wght@400;700&family=Baloo+2:wght@400..800&family=Cambay:wght@400;700&family=Dekko&family=Eczar:wght@400..800&family=Glegoo:wght@400;700&family=Gotu&family=Hind:wght@300;400;500;600;700&family=Kalam:wght@300;400;700&family=Karma:wght@300;400;500;600;700&family=Khand:wght@300;400;500;600;700&family=Kurale&family=Laila:wght@300;400;500;600;700&family=Martel:wght@200;300;400;600;700;800;900&family=Martel+Sans:wght@200;300;400;600;700;800;900&family=Modak&family=Mukta:wght@200;300;400;500;600;700;800&family=Noto+Sans+Devanagari:wght@100..900&family=Palanquin:wght@100;200;300;400;500;600;700&family=Rajdhani:wght@300;400;500;600;700&family=Ranga:wght@400;700&family=Rozha+One&family=Sarala:wght@400;700&family=Sarpanch:wght@400;500;600;700;800;900&family=Teko:wght@300;400;500;600;700&family=Tillana:wght@400;500;600;700;800&family=Tiro+Devanagari+Hindi&family=Yatra+One&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./index.css">
</head>

<body>
    <div id="app">
        <a href="https://turboscribe.ai/dashboard">Generate Audio to Subtitle</a>
        <a href="https://www.linkedin.com/in/nishant-kumar-692477226/"
            style="position: absolute; bottom: 10px; right: 10px;">👷‍♂️</a>
        <div id="canvas-row">
            <aside id="style-panel" aria-label="Subtitle styles"></aside>
            <canvas id="canvas"></canvas>
            <div style="display: flex; flex-direction: column;">
                <button id="recordButton"
                    style="position: relative; top: 0; padding: 12px 24px; background: linear-gradient(135deg, #ff4b5c, #ff7b81); border: none; border-radius: 999px; color: #ffffff; font-weight: 700; cursor: pointer; box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15); transition: transform 0.2s ease, box-shadow 0.2s ease;">●
                    Record</button>
                <div style="font-size: 10px; color:#ff4b5c;">Records(Just font text), is not as expected but working on it</div>
            </div>
        </div>
        <div id="timeline">
            <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px; align-items:center;">
                <label style="font-size:14px;">
                    Transcript (.srt)
                    <input id="transcriptInput" type="file" accept=".srt" />
                </label>
                <label style="font-size:14px;">
                    Audio
                    <input id="audioInput" type="file" accept="audio/*" />
                </label>
                <label style="font-size:14px;">
                    Background
                    <input id="backgroundInput" type="file" accept="image/*" />
                </label>
            </div>
            TimeLine
            <div id="time_region">
                <div id="time_content">
                    <!-- your timeline markers/clips/tracks go here -->
                </div>
            </div>
            <div id="play">Play controls</div>
            <div id="style-panel" style="width: 100%; color: rgb(105, 105, 102); font-size: 17px;">Stats</div>
        </div>
    </div>
    <script type="module" src="./index.js"></script>
    <script type="module" src="./ui.js"></script>
</body>

</html>
