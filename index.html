<body>
    <div id="app">
        <header class="topbar">
            <div class="brand">🎬 Typography Video Editor</div>
            <nav class="topbar-links">
                <a href="https://turboscribe.ai/dashboard" target="_blank" rel="noopener">Generate Audio → Subtitle</a>
                <a href="https://www.linkedin.com/in/nishant-kumar-692477226/" target="_blank" rel="noopener"
                    aria-label="Nishant Kumar on LinkedIn">👷‍♂️</a>
            </nav>
        </header>

        <div id="canvas-row">
            <aside id="style-panel" aria-label="Subtitle styles"></aside>

            <div class="canvas-stage">
                <canvas id="canvas"></canvas>
            </div>

            <div class="side-actions">
                <button id="recordButton" class="btn btn-record">● Record</button>
                <p class="hint-text">Records (just the font text) — still a work in progress.</p>
            </div>
        </div>

        <section id="timeline" aria-label="Timeline and transport controls">
            <div class="upload-row">
                <label class="upload-field">
                    <span>Transcript (.srt)</span>
                    <input id="transcriptInput" type="file" accept=".srt" />
                </label>
                <label class="upload-field">
                    <span>Audio</span>
                    <input id="audioInput" type="file" accept="audio/*" />
                </label>
                <label class="upload-field">
                    <span>Background</span>
                    <input id="backgroundInput" type="file" accept="image/*" />
                </label>
            </div>

            <div class="timeline-header">
                <span class="timeline-label">Timeline</span>
                <div class="transport-controls">
                    <button id="playButton" class="btn btn-transport btn-play" aria-label="Play">▶ Play</button>
                    <button id="stopButton" class="btn btn-transport btn-stop" aria-label="Stop">■ Stop</button>
                </div>
            </div>

            <div id="time_region">
                <div id="time_content">
                    <!-- your timeline markers/clips/tracks go here -->
                </div>
            </div>

            <div class="stats-panel">Stats</div>
        </section>
    </div>
    <script type="module" src="/src/index.ts"></script>
    <script type="module" src="/src/ui.ts"></script>
</body>
